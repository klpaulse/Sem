<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo-varianter – Breddefotball Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      font-family: Inter, Arial, sans-serif;
      padding: 2.5rem 2rem;
      min-height: 100vh;
    }
    h1 {
      color: #444;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      max-width: 860px;
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }
    .card {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 2rem 1.75rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      border: 1px solid #222;
    }
    .card-label {
      color: #444;
      font-size: 0.68rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .card-logo {
      display: flex;
      align-items: center;
    }
    /* Fake header context */
    .card-header-ctx {
      background: #0d0d0d;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <h1>Logo-varianter – Breddefotball Live</h1>

  <div class="grid">

    <!-- A: Klassisk stacked (nåværende) -->
    <div class="card">
      <span class="card-label">A – Klassisk (nåværende)</span>
      <div class="card-header-ctx">
        <svg height="44" viewBox="0 0 280 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ff3b3b"/>
              <stop offset="100%" stop-color="#ff7b3b"/>
            </linearGradient>
          </defs>
          <circle cx="20" cy="20" r="17" stroke="white" stroke-width="1.8"/>
          <path d="M20 5 L27 10 L24 18 L16 18 L13 10 Z" stroke="white" stroke-width="1.4" fill="none"/>
          <path d="M20 35 L27 30 L24 22 L16 22 L13 30 Z" stroke="white" stroke-width="1.4" fill="none"/>
          <path d="M4 14 L10 12 L13 18 L9 24 L3 22 Z" stroke="white" stroke-width="1.4" fill="none"/>
          <path d="M36 14 L30 12 L27 18 L31 24 L37 22 Z" stroke="white" stroke-width="1.4" fill="none"/>
          <text x="46" y="18" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="white" letter-spacing="2">BREDDEFOTBALL</text>
          <circle cx="36" cy="32" r="3.5" fill="#ff3b3b">
            <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
          </circle>
          <text x="47" y="36" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="url(#gA)" letter-spacing="4">LIVE</text>
          <rect x="46" y="39" width="100" height="2" rx="1" fill="url(#gA)"/>
        </svg>
      </div>
    </div>

    <!-- B: Kompakt, én linje -->
    <div class="card">
      <span class="card-label">B – Kompakt, én linje</span>
      <div class="card-header-ctx">
        <svg height="32" viewBox="0 0 260 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gB" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ff3b3b"/>
              <stop offset="100%" stop-color="#ff7b3b"/>
            </linearGradient>
          </defs>
          <circle cx="16" cy="16" r="13" stroke="white" stroke-width="1.6"/>
          <path d="M16 5 L22 9 L20 14 L12 14 L10 9 Z" stroke="white" stroke-width="1.3" fill="none"/>
          <path d="M16 27 L22 23 L20 18 L12 18 L10 23 Z" stroke="white" stroke-width="1.3" fill="none"/>
          <path d="M4 12 L9 10 L11 15 L8 20 L3 18 Z" stroke="white" stroke-width="1.3" fill="none"/>
          <path d="M28 12 L23 10 L21 15 L24 20 L29 18 Z" stroke="white" stroke-width="1.3" fill="none"/>
          <text x="36" y="21" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="white" letter-spacing="1.5">BREDDEFOTBALL</text>
          <circle cx="198" cy="16" r="3.5" fill="#ff3b3b">
            <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
          </circle>
          <text x="207" y="21" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="url(#gB)" letter-spacing="3">LIVE</text>
        </svg>
      </div>
    </div>

    <!-- C: Gradient tekst, uten ikon -->
    <div class="card">
      <span class="card-label">C – Gradient tekst (uten ikon)</span>
      <div class="card-header-ctx">
        <svg height="46" viewBox="0 0 210 46" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gC" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ff3b3b"/>
              <stop offset="100%" stop-color="#ff7b3b"/>
            </linearGradient>
          </defs>
          <text x="0" y="22" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="900" fill="url(#gC)" letter-spacing="0.5">BREDDEFOTBALL</text>
          <rect x="0" y="27" width="210" height="1.5" rx="1" fill="url(#gC)" opacity="0.25"/>
          <circle cx="5" cy="39" r="3.5" fill="#ff3b3b">
            <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
          </circle>
          <text x="15" y="43" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="5" opacity="0.65">LIVE</text>
        </svg>
      </div>
    </div>

    <!-- D: LIVE som hovedelement -->
    <div class="card">
      <span class="card-label">D – LIVE i fokus</span>
      <div class="card-header-ctx">
        <svg height="46" viewBox="0 0 230 46" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gD" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ff3b3b"/>
              <stop offset="100%" stop-color="#ff7b3b"/>
            </linearGradient>
          </defs>
          <circle cx="21" cy="23" r="18" stroke="white" stroke-width="1.8" opacity="0.9"/>
          <path d="M21 7 L29 12 L26 21 L16 21 L13 12 Z" stroke="white" stroke-width="1.4" fill="none" opacity="0.9"/>
          <path d="M21 39 L29 34 L26 25 L16 25 L13 34 Z" stroke="white" stroke-width="1.4" fill="none" opacity="0.9"/>
          <path d="M4 17 L11 15 L14 21 L10 28 L3 26 Z" stroke="white" stroke-width="1.4" fill="none" opacity="0.9"/>
          <path d="M38 17 L31 15 L28 21 L32 28 L39 26 Z" stroke="white" stroke-width="1.4" fill="none" opacity="0.9"/>
          <text x="49" y="16" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="700" fill="white" letter-spacing="3" opacity="0.5">BREDDEFOTBALL</text>
          <text x="48" y="40" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900" fill="url(#gD)" letter-spacing="4">LIVE</text>
          <circle cx="49" cy="23" r="4" fill="#ff3b3b">
            <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
          </circle>
        </svg>
      </div>
    </div>

  </div>
</body>
</html>
